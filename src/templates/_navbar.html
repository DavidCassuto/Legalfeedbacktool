<style>
  .dc-navbar {
    position: sticky; top: 0; z-index: 1000;
    background: linear-gradient(135deg, #4D908E 0%, #52796F 100%);
    padding: 10px 20px;
    display: flex; justify-content: space-between; align-items: center;
    flex-wrap: wrap; gap: 8px;
    box-shadow: 0 2px 8px rgba(77,144,142,0.35);
  }
  .dc-navbar a { color: white; text-decoration: none; font-family: 'Segoe UI', sans-serif; font-size: 0.92em; }
  .dc-navbar-brand { font-size: 1.2em; font-weight: bold; }
  .dc-navbar-links { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
  .dc-navbar-links a {
    padding: 5px 10px; border-radius: 4px; font-weight: 500;
    transition: background 0.2s;
  }
  .dc-navbar-links a:hover { background: rgba(255,255,255,0.2); }
</style>

<nav class="dc-navbar">
  <a href="{{ url_for('index') }}" class="dc-navbar-brand">📄 DocuCheck</a>
  <div class="dc-navbar-links">
    {% if session.get('user_id') %}
      <a href="{{ url_for('upload_document') }}">📤 Uploaden</a>
      <a href="{{ url_for('list_documents') }}">📁 Documenten</a>
      <a href="{{ url_for('list_criteria') }}">✅ Criteria</a>
      <a href="{{ url_for('list_sections') }}">📋 Secties</a>
      {% if session.get('role') == 'admin' %}
        <a href="{{ url_for('list_document_types') }}">📑 Documenttypen</a>
        <a href="{{ url_for('list_organizations') }}">🏢 Organisaties</a>
        <a href="{{ url_for('list_users') }}">👥 Gebruikers</a>
      {% endif %}
      <a href="{{ url_for('logout') }}" style="font-weight:bold; color:#FFD700;">🚪 Uitloggen</a>
    {% else %}
      <a href="{{ url_for('login') }}">🔑 Inloggen</a>
    {% endif %}
  </div>
</nav>
