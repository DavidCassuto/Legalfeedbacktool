{% extends 'base.html' %}

{% block title %}Nieuwe organisatie{% endblock %}

{% block content %}
<div class="header">
    <h1>➕ Nieuwe organisatie</h1>
    <div class="nav-breadcrumb">
        <a href="{{ url_for('index') }}">Home</a> &gt;
        <a href="{{ url_for('list_organizations') }}">Organisaties</a> &gt; Nieuw
    </div>
</div>

<div class="card" style="max-width:640px;">
    <form method="POST" action="{{ url_for('add_organization') }}">
        <label for="name" style="display:block; font-weight:600; margin-bottom:6px;">Naam *</label>
        <input type="text" id="name" name="name" required
               style="width:100%; padding:10px; border:1px solid #CED4DA; border-radius:8px;"
               placeholder="bv. Hogeschool Inholland — Economie">

        <label for="description" style="display:block; font-weight:600; margin:16px 0 6px;">Beschrijving</label>
        <textarea id="description" name="description" rows="3"
                  style="width:100%; padding:10px; border:1px solid #CED4DA; border-radius:8px; font-family:inherit;"
                  placeholder="Optioneel"></textarea>

        <div style="margin-top:18px; display:flex; gap:10px;">
            <button type="submit" class="btn">Opslaan</button>
            <a href="{{ url_for('list_organizations') }}" class="btn btn-secondary">Annuleren</a>
        </div>
    </form>
</div>
{% endblock %}
