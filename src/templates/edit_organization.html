{% extends 'base.html' %}

{% block title %}Organisatie bewerken{% endblock %}

{% block content %}
<div class="header">
    <h1>✏️ Organisatie bewerken</h1>
    <div class="nav-breadcrumb">
        <a href="{{ url_for('index') }}">Home</a> &gt;
        <a href="{{ url_for('list_organizations') }}">Organisaties</a> &gt; Bewerken
    </div>
</div>

<div class="card" style="max-width:640px;">
    <form method="POST" action="{{ url_for('edit_organization', id=organization.id) }}">
        <label for="name" style="display:block; font-weight:600; margin-bottom:6px;">Naam *</label>
        <input type="text" id="name" name="name" required value="{{ organization.name }}"
               style="width:100%; padding:10px; border:1px solid #CED4DA; border-radius:8px;">

        <label for="description" style="display:block; font-weight:600; margin:16px 0 6px;">Beschrijving</label>
        <textarea id="description" name="description" rows="3"
                  style="width:100%; padding:10px; border:1px solid #CED4DA; border-radius:8px; font-family:inherit;">{{ organization.description or '' }}</textarea>

        <div style="margin-top:18px; display:flex; gap:10px;">
            <button type="submit" class="btn">Wijzigingen opslaan</button>
            <a href="{{ url_for('list_organizations') }}" class="btn btn-secondary">Annuleren</a>
        </div>
    </form>
</div>
{% endblock %}
